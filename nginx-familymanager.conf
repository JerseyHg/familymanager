    # ══════════════════════════════════════
    # Family Manager
    # ══════════════════════════════════════

    # ── API 代理 ──
    location /familymanager/api/ {
        proxy_pass http://127.0.0.1:8005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # ── 健康检查 ──
    location = /familymanager/health {
        proxy_pass http://127.0.0.1:8005/health;
    }

    # ── 前端静态文件 ──
    location /familymanager/ {
        alias /root/familymanager/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /familymanager/index.html;
    }
